apiVersion: apps/v1
kind: DaemonSet
metadata:
  labels:
    app: function-proxy
  name: function-proxy
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    matchLabels:
      app: function-proxy
  updateStrategy:
    rollingUpdate:
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: function-proxy
    spec:
      dnsPolicy: ClusterFirstWithHostNet
      dnsConfig:
        options:
          - name: single-request-reopen
      hostNetwork: true
      restartPolicy: Always
      imagePullSecrets:
        - name: default-secret
      securityContext:
        fsGroup: 1002
      serviceAccountName: function-proxy
            {{- if .Values.global.enableNonPreemptive }}
      priorityClassName: proxy-custom-priority-nonpreempting-{{ .Values.global.namespace }}
            {{- else }}
      priorityClassName: system-cluster-critical
            {{- end }}
            {{- if .Values.global.functionProxy.nodeSelector }}
            {{- with .Values.global.functionProxy.nodeSelector }}
      nodeSelector:
              {{- toYaml . | nindent 8 }}
            {{- end }}
            {{- end }}
            {{- if .Values.global.functionProxy.nodeAffinity }}
            {{- with .Values.global.functionProxy.nodeAffinity }}
      affinity:
        nodeAffinity:
                {{- toYaml . | nindent 10 }}
            {{- end }}
            {{- end }}
            {{- if .Values.global.controlPlane.tolerations }}
            {{- with .Values.global.controlPlane.tolerations }}
      tolerations:
              {{- toYaml . | nindent 8 }}
            {{- end }}
            {{- end }}
      volumes:
        - name: local-time
          hostPath:
            path: /etc/localtime
        - emptyDir: { }
          name: metrics-parent-dir
        - emptyDir: { }
          name: metrics-dir
        - configMap:
            defaultMode: 0440
            items:
              - key: services.yaml
                path: services.yaml
            name: services-config
          name: services
        - configMap:
            defaultMode: 0440
            items:
              - key: redisConfig.json
                path: conf.json
            name: function-proxy-config
          name: function-proxy-config
            {{- if .Values.global.iam.enable }}
        - configMap:
            defaultMode: 0440
            items:
              - key: iam-policy-config.json
                path: iam-policy-config.json
            name: iam-policy-config
          name: iam-policy-config
            {{- end }}
        - name: log-volume
          hostPath:
            path: "{{ .Values.global.log.hostPath.componentLog }}"
            type: DirectoryOrCreate
        - name: config-volume
          configMap:
            defaultMode: 0440
            name: components-toml-config
      initContainers:
        - name: function-proxy-init
          image: {{ .Values.global.imageRegistry }}{{ .Values.global.images.agentInit }}
          command: [ "/bin/sh", "-c", "chown 1002:1002 /home/sn/log && chmod 777 /home/sn/log" ]
          env:
            - name: RUNTIME_POD_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
          resources:
            limits:
              cpu: {{ .Values.global.resources.functionAgentInit.limits.cpu }}
              memory: {{ .Values.global.resources.functionAgentInit.limits.memory }}
            requests:
              cpu: {{ .Values.global.resources.functionAgentInit.requests.cpu }}
              memory: {{ .Values.global.resources.functionAgentInit.requests.memory }}
          volumeMounts:
            - name: log-volume
              mountPath: {{ .Values.global.log.functionSystem.path}}
              subPathExpr: $(RUNTIME_POD_NAME)
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
          securityContext:
            capabilities:
              add:
                - CHOWN
                - NET_RAW
                - NET_ADMIN
                - SYS_ADMIN
                - CHOWN
                - SETGID
                - SETUID
                - DAC_OVERRIDE
                - FOWNER
                - FSETID
              drop:
                - ALL
            runAsUser: 0
      containers:
        - name: function-proxy
          image: {{ .Values.global.imageRegistry }}{{ .Values.global.images.common }}
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
                umask 0027
                [ ! -d {{quote .Values.global.log.functionSystem.path}} ] && mkdir -p {{quote .Values.global.log.functionSystem.path}}
                python3 -m yr.cli.main -v launch --env-subst HOST_IP,NODE_ID function_proxy
          env:
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.hostIP
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
          ports:
            - containerPort: {{ .Values.global.port.functionProxyPort }}
              hostPort: {{ .Values.global.port.functionProxyPort }}
              protocol: TCP
            {{- if or (eq .Values.global.common.driverEnable true) (eq .Values.global.runtime.serverModeEnable true) }}
            - containerPort: {{ .Values.global.port.functionProxyGrpcPort }}
              hostPort: {{ .Values.global.port.functionProxyGrpcPort }}
              protocol: TCP
            {{- end}}
          livenessProbe:
            failureThreshold: 3
            tcpSocket:
              port: {{ .Values.global.port.functionProxyPort }}
            initialDelaySeconds: 1
            periodSeconds: 5
            successThreshold: 1
            timeoutSeconds: 5
          resources:
            limits:
              cpu: {{ .Values.global.resources.functionProxy.limits.cpu }}
              memory: {{ .Values.global.resources.functionProxy.limits.memory }}
            requests:
              cpu: {{ .Values.global.resources.functionProxy.requests.cpu }}
              memory: {{ .Values.global.resources.functionProxy.requests.memory }}
          securityContext:
            capabilities: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - mountPath: {{ .Values.global.log.functionSystem.path }}
              name: log-volume
              {{- if .Values.global.log.hostPath.enable }}
              subPathExpr: $(POD_NAME)
              {{- end}}
            - mountPath: /etc/localtime
              name: local-time
            {{- if .Values.global.scc.enable }}
            - name: scc-ks
              mountPath: /home/sn/resource/scc
              readOnly: true
            {{- end }}
            {{- if .Values.global.etcdManagement.useSecret }}
            - name: etcd-client-certs
              mountPath: /home/sn/resource/etcd
              readOnly: true
            {{- end }}
            {{- if .Values.global.iam.enable }}
            - name: iam-policy-config
              mountPath: /home/sn/iam-config
              readOnly: true
            {{- end }}
            - name: function-proxy-config
              mountPath: /home/sn/conf
              readOnly: true
            - mountPath: /home/sn/metrics
              name: metrics-parent-dir
            - mountPath: /home/sn/service-config
              name: services
              readOnly: true
            - name: config-volume
              mountPath: /etc/yuanrong/config.toml
              subPath: config.toml
