apiVersion: apps/v1
kind: Deployment
metadata:
  name: meta-service
  namespace: {{ .Values.global.namespace }}
spec:
  progressDeadlineSeconds: 600
  replicas: {{ .Values.global.replicas.metaService  }}
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: meta-service
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: meta-service
    spec:
      automountServiceAccountToken: false
      {{- if .Values.global.log.hostPath.enable }}
      initContainers:
        - name: meta-service-init
          image: {{ .Values.global.imageRegistry }}{{ .Values.global.images.agentInit }}
          securityContext:
            runAsUser: 0
          command: ["/bin/sh", "-c", "chown 1002:1002 /home/sn/log && chmod 777 /home/sn/log"]
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
          volumeMounts:
            - mountPath: {{ .Values.global.log.functionSystem.path}}
              name: varlog
              subPathExpr: $(POD_NAME)
      {{- end }}
      affinity:
        {{- if .Values.global.controlPlane.nodeAffinity }}
        {{- with .Values.global.controlPlane.nodeAffinity }}
        nodeAffinity:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- end }}
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - meta-service
                topologyKey: kubernetes.io/hostname
              weight: 1
      {{- if .Values.global.controlPlane.nodeSelector }}
      {{- with .Values.global.controlPlane.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      {{- if .Values.global.controlPlane.tolerations }}
      {{- with .Values.global.controlPlane.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      containers:
      - name: meta-service
        command:
          - /bin/sh
          - -c
          - |
              if [ "$(whoami)X" != "${USER_NAME}X" ]; then
                if [ -w /etc/passwd ]; then
                  echo "${USER_NAME:-sn}:x:$(id -u):$(id -g):${USER_NAME:-sn} user:${HOME}:/sbin/nologin" >> /etc/passwd
                fi
              fi
              umask 0027
              python3 -m yr.cli.main -v launch --inherit-env meta_service
        imagePullPolicy: IfNotPresent
        image: {{ .Values.global.imageRegistry }}{{ .Values.global.images.common }}
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthz
            {{- if .Values.global.mutualSSLConfig.sslEnable }}
            port: 8090
            scheme: HTTPS
            {{ else }}
            port: 8081
            scheme: HTTP
            {{- end }}
          initialDelaySeconds: 1
          periodSeconds: 5
          successThreshold: 1
          timeoutSeconds: 5
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthz
            {{- if .Values.global.mutualSSLConfig.sslEnable }}
            port: 8090
            scheme: HTTPS
            {{ else }}
            port: 8081
            scheme: HTTP
            {{- end }}
          initialDelaySeconds: 1
          periodSeconds: 5
          successThreshold: 1
          timeoutSeconds: 5
        ports:
        - containerPort: 8080
          name: 8080tcp80800
          protocol: TCP
        resources:
          limits:
            cpu: {{ .Values.global.resources.metaService.limits.cpu }}
            memory: {{ .Values.global.resources.metaService.limits.memory }}
          requests:
            cpu: {{ .Values.global.resources.metaService.requests.cpu }}
            memory: {{ .Values.global.resources.metaService.requests.memory }}
        env:
          - name: POD_IP
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: status.podIP
          - name: POD_NAME
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: metadata.name
        securityContext:
          capabilities: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - name: config-volume
          mountPath: /etc/yuanrong/config.toml
          subPath: config.toml
        - mountPath: /etc/localtime
          name: local-time
        - mountPath: /home/yuanrong/config
          name: meta-service-configmap
        - mountPath: {{ .Values.global.log.functionSystem.path}}
          name: varlog
          {{- if .Values.global.log.hostPath.enable }}
          subPathExpr: $(POD_NAME)
          {{- end }}
        {{- if .Values.global.mutualSSLConfig.sslEnable }}
        - mountPath: {{quote .Values.global.mutualSSLConfig.sslBasePath }}
          name: module-sec
        {{- end }}
        {{- if .Values.global.scc.enable }}
        - name: scc-ks
          mountPath: /home/sn/resource/scc
          readOnly: true
        {{- end }}
        {{- if .Values.global.etcdManagement.useSecret }}
        - name: etcd-client-certs
          mountPath: /home/sn/resource/etcd
          readOnly: true
        {{- end }}
      dnsPolicy: ClusterFirst
      imagePullSecrets:
      - name: default-secret
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {
                         fsGroup: 1002
      }
      priorityClassName: system-cluster-critical
      terminationGracePeriodSeconds: 30
      volumes:
      - name: config-volume
        configMap:
            defaultMode: 0440
            name: components-toml-config
      - name: local-time
        hostPath:
          path: /etc/localtime
      {{- if .Values.global.log.hostPath.enable }}
      - name: varlog
        hostPath:
          path: "{{ .Values.global.log.hostPath.componentLog }}"
          type: DirectoryOrCreate
      {{- else }}
      - emptyDir: {}
        name: varlog
      {{- end }}
      - configMap:
          defaultMode: 0440
          items:
            - key: config.json
              path: config.json
            - key: log.json
              path: log.json
          name: meta-service-configmap
        name: meta-service-configmap
      {{- if .Values.global.mutualSSLConfig.sslEnable }}
      - name: module-sec
        secret:
          defaultMode: 0400
          secretName: {{ .Values.global.mutualSSLConfig.secretName }}
      {{- end }}
      {{- if .Values.global.scc.enable }}
      - name: scc-ks
        secret:
          defaultMode: 0440
          secretName: {{ .Values.global.scc.secretName }}
      {{- end }}
      {{- if .Values.global.etcdManagement.useSecret }}
      - name: etcd-client-certs
        secret:
          defaultMode: 0440
          secretName: {{ .Values.global.etcdManagement.secretName }}
      {{- end }}