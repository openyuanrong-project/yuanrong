apiVersion: v1
kind: Service
metadata:
  annotations:
    kubernetes.io/elb.id: {{ quote .Values.global.network.elbId }}
  labels:
    app: frontend
  name: frontend-lb
  namespace: {{ .Values.global.namespace }}
spec:
  externalTrafficPolicy: Cluster
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - name: frontend-lb
      protocol: TCP
      port: {{ .Values.global.port.frontendNodePort }}
      targetPort: {{ .Values.global.port.frontendPort }}
      nodePort: {{ .Values.global.port.frontendNodePort }}